apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
spec:
  type: {{ .Values.service.type }}
  selector: 
  # lables are used as selectors
    project: roboshop
    purpose: rs-demo
    tier: frontend
    component: frontend
  ports:
  - protocol: TCP
    port: 80 # servie port
    targetPort: 80 # container port


